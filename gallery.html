<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Henrie Mbogo</title>
    
    <link rel="stylesheet" href="css/master-style.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.1/css/lightgallery.min.css">
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-orbs">
            <div class="orb orb1"></div>
            <div class="orb orb2"></div>
            <div class="orb orb3"></div>
            <div class="orb orb4"></div>
        </div>
    </div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Navigation -->
    <nav class="navbar glass-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">H</span>
                <span class="logo-text-secondary">M</span>
                <div class="logo-dot"></div>
            </a>
            
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="services.html" class="nav-link">Services</a></li>
                <li><a href="gallery.html" class="nav-link active">Gallery</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            
            <div class="nav-right">
                <div class="language-switcher">
                    <button class="lang-btn active">EN</button>
                    <button class="lang-btn">LG</button>
                </div>
                <button class="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <div class="header-content" data-aos="fade-up">
                <h1>My <span class="gradient-text">Gallery</span></h1>
                <div class="breadcrumb">
                    <a href="index.html">Home</a>
                    <i class="fas fa-chevron-right"></i>
                    <span>Gallery</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery Filter -->
    <section class="gallery-filter-section">
        <div class="container">
            <div class="filter-buttons" data-aos="fade-up">
                <button class="filter-btn active" data-filter="all">All Photos</button>
                <button class="filter-btn" data-filter="driving">On the Road</button>
                <button class="filter-btn" data-filter="community">Community</button>
                <button class="filter-btn" data-filter="personal">Personal</button>
                <button class="filter-btn" data-filter="nature">Nature</button>
                <button class="filter-btn" data-filter="events">Events</button>
            </div>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="gallery-section">
        <div class="container">
            <div class="gallery-grid" id="gallery-grid">
                <!-- Gallery items will be loaded via JavaScript -->
            </div>
            
            <div class="gallery-load-more" data-aos="fade-up">
                <button id="load-more" class="btn btn-outline">
                    <span>Load More Photos</span>
                    <i class="fas fa-arrow-down"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- Gallery Stats -->
    <section class="gallery-stats-section">
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card glass-card" data-aos="zoom-in">
                    <div class="stat-icon">
                        <i class="fas fa-camera"></i>
                    </div>
                    <div class="stat-number">50+</div>
                    <div class="stat-label">Photos</div>
                </div>
                
                <div class="stat-card glass-card" data-aos="zoom-in" data-aos-delay="100">
                    <div class="stat-icon">
                        <i class="fas fa-map-marked-alt"></i>
                    </div>
                    <div class="stat-number">15+</div>
                    <div class="stat-label">Locations</div>
                </div>
                
                <div class="stat-card glass-card" data-aos="zoom-in" data-aos-delay="200">
                    <div class="stat-icon">
                        <i class="fas fa-calendar"></i>
                    </div>
                    <div class="stat-number">10+</div>
                    <div class="stat-label">Years</div>
                </div>
                
                <div class="stat-card glass-card" data-aos="zoom-in" data-aos-delay="300">
                    <div class="stat-icon">
                        <i class="fas fa-heart"></i>
                    </div>
                    <div class="stat-number">1k+</div>
                    <div class="stat-label">Likes</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Instagram Feed Preview -->
    <section class="instagram-feed">
        <div class="container">
            <div class="section-header" data-aos="fade-up">
                <span class="section-subtitle">Follow Me</span>
                <h2 class="section-title">@henrie_<span class="gradient-text">mbogo</span></h2>
            </div>
            
            <div class="instagram-grid">
                <a href="#" class="insta-item" data-aos="zoom-in">
                    <img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=400" alt="Instagram">
                    <div class="insta-overlay">
                        <i class="fab fa-instagram"></i>
                    </div>
                </a>
                <a href="#" class="insta-item" data-aos="zoom-in" data-aos-delay="50">
                    <img src="https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?w=400" alt="Instagram">
                    <div class="insta-overlay">
                        <i class="fab fa-instagram"></i>
                    </div>
                </a>
                <a href="#" class="insta-item" data-aos="zoom-in" data-aos-delay="100">
                    <img src="https://images.unsplash.com/photo-1581092160562-40aa08e52637?w=400" alt="Instagram">
                    <div class="insta-overlay">
                        <i class="fab fa-instagram"></i>
                    </div>
                </a>
                <a href="#" class="insta-item" data-aos="zoom-in" data-aos-delay="150">
                    <img src="https://images.unsplash.com/photo-1522932464377-2c78ed5f94d3?w=400" alt="Instagram">
                    <div class="insta-overlay">
                        <i class="fab fa-instagram"></i>
                    </div>
                </a>
                <a href="#" class="insta-item" data-aos="zoom-in" data-aos-delay="200">
                    <img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=400" alt="Instagram">
                    <div class="insta-overlay">
                        <i class="fab fa-instagram"></i>
                    </div>
                </a>
                <a href="#" class="insta-item" data-aos="zoom-in" data-aos-delay="250">
                    <img src="https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?w=400" alt="Instagram">
                    <div class="insta-overlay">
                        <i class="fab fa-instagram"></i>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <!-- Same footer content -->
    </footer>

    <button class="back-to-top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.1/lightgallery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/justified
